services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.insecure=false" # Kein ungesichertes Dashboard freigeben
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Automatischer HTTP auf HTTPS Redirect
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # Let's Encrypt SSL-Zertifikate Konfiguration
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=it-admin@${DOMAIN_NAME}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    networks:
      - pfadfinder_net
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
    labels:
      # ===== Globale Security-Headers Middleware (KDG/DSGVO-konform) =====
      # Referenz: https://securityheaders.com / OWASP Secure Headers Project
      # Wird von allen Services via "security-headers@docker" referenziert.
      #
      # HSTS: Browser duerfen nur ueber HTTPS verbinden (1 Jahr Cache)
      - "traefik.http.middlewares.security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.security-headers.headers.stsPreload=true"
      # Clickjacking-Schutz: Seite darf nicht in Frames eingebettet werden
      - "traefik.http.middlewares.security-headers.headers.frameDeny=true"
      # MIME-Sniffing verhindern (XSS-Vektor)
      - "traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true"
      # XSS-Filter des Browsers aktivieren
      - "traefik.http.middlewares.security-headers.headers.browserXssFilter=true"
      # Referrer-Policy: Nur Origin senden, keine vollen URLs
      - "traefik.http.middlewares.security-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      # Permissions-Policy: Kamera, Mikrofon, Geolocation standardmaessig deaktiviert
      - "traefik.http.middlewares.security-headers.headers.permissionsPolicy=camera=(), microphone=(), geolocation=()"

networks:
  pfadfinder_net:
    external: true

