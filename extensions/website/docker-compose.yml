services:
  website:
    image: nginx:alpine
    container_name: pfadfinder-website
    restart: unless-stopped
    networks:
      - pfadfinder_net
    volumes:
      - ./html:/usr/share/nginx/html:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      # Die Website wird sauber auf www.eure-domain.de geroutet
      - "traefik.http.routers.website.rule=Host(`www.${DOMAIN_NAME}`)"
      - "traefik.http.routers.website.entrypoints=websecure"
      - "traefik.http.routers.website.tls.certresolver=myresolver"
      - "traefik.http.routers.website.middlewares=security-headers@docker"
      - "traefik.http.services.website.loadbalancer.server.port=80"

networks:
  pfadfinder_net:
    external: true
