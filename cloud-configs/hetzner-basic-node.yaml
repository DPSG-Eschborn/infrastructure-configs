#cloud-config
package_update: true
package_upgrade: true
packages:
  - git
  - curl
  - apt-transport-https
  - ca-certificates
  - gnupg
  - openssl
  - fail2ban

# Blockieren von Root Password-Login gemäß P10 Security
ssh_pwauth: false

users:
  - name: pfadiadmin
    groups: sudo
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_import_id:
      - gh:pfadfinder-admin # <-- GitHub Username hier anpassen, um automatischen SSH-Key zu ziehen

runcmd:
  # SSH auf Port 2222 verschieben für mehr Schutz (Security by Obscurity)
  - sed -i 's/#*Port 22/Port 2222/g' /etc/ssh/sshd_config
  - systemctl restart ssh

  # UFW Firewall strikt aktivieren (P10 Security)
  - ufw --force enable
  - ufw allow 2222/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  
  # Das Pfadfinder-Repo clonen (Atomic Bootstrapping)
  - git clone https://github.com/DPSG-Eschborn/infrastructure-configs.git /opt/pfadfinder-cloud
  
  # Setup im lautlosen Headless-Modus ausführen. 
  # WICHTIG: In Cloud-Init müssen cd und Ausführung in einem Rutsch via && geschrieben werden!
  # --domain=AUTO erkennt die Server-IP automatisch und startet im HTTP-Test-Modus.
  # Wenn ihr eine echte Domain habt, ersetzt AUTO durch: --domain=eure-domain.de
  - cd /opt/pfadfinder-cloud && chmod +x setup.sh && ./setup.sh --headless --install=core,nextcloud,website --domain=AUTO > /var/log/pfadfinder-setup.log 2>&1
  
  # Docker-Gruppe dem User zuweisen (Docker wird erst durch setup.sh installiert)
  - usermod -aG docker pfadiadmin
  
  # Finaler Reboot für sauberes Laden aller neuer Berechtigungen (Docker Groups etc.)
  - reboot
