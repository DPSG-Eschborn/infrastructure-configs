#cloud-config
package_update: true
package_upgrade: true
packages:
  - git
  - curl
  - apt-transport-https
  - ca-certificates
  - gnupg
  - openssl

# Blockieren von Root Password-Login gemäß P10 Security
ssh_pwauth: false

users:
  - name: pfadiadmin
    groups: sudo, docker
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_import_id:
      - gh:pfadfinder-admin # <-- GitHub Username hier anpassen, um automatischen SSH-Key zu ziehen

runcmd:
  # UFW Firewall strikt aktivieren (P10 Security)
  - ufw --force enable
  - ufw allow ssh
  - ufw allow http
  - ufw allow https
  
  # Das Pfadfinder-Repo clonen (Atomic Bootstrapping)
  - git clone https://github.com/DPSG-Eschborn/infrastructure-configs.git /opt/pfadfinder-cloud
  - cd /opt/pfadfinder-cloud
  - chmod +x setup.sh
  
  # Setup im lautlosen Headless-Modus ausführen. 
  # Parameter können hier direkt angepasst werden (z.B. --install=core,nextcloud)
  - ./setup.sh --headless --install=traefik --domain=cloud.unsere-domain.de > /var/log/pfadfinder-setup.log 2>&1
